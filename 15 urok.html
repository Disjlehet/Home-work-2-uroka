<body><!--Задание 1-->
    <div class="block">My name is Shyngys</div> <!--Является блочным элементом т.к. начинается с новой строки и занимает всю доступную ширину-->
    <h1 class="block">19 y.o.</h1> <!--тоже является блочным-->
    <p class="block">it's paragraph</p> <!--тоже является блочным-->
    <img src="me.png" alt="Me"> <!--Не является блочным потому что если сейчас поставим две фото вместе они будут в одном ряду и не занимает всю доступную ширину-->
    <img src="me.png" alt="Me"> <!--видим что они в одном ряду-->
</body>
<body><!--Задание 2-->
    <img src="me.png" alt="me" class="inline-to-block"> <!--Оно стало блочным и 
    начинается с новой строки. Мы можем дать ему ширину высоты и т.д.-->
    <p class="block-to-inline">Мы смотрим</p>
    <p class="block-to-inline">в небо и смотри это все в одной строке</p>
</body>
<body> <!--Задание 3-->
    <div class="container">
        <p>Это у нас абзац</p>
        <img src="me.png" alt="me">
        <a href="#">Это у нас ссылка</a>
    </div>
</body>
</html>
